<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MAPA DA LIBERDADE — Cada território conquistado é um passo rumo à liberdade total.">
  <title>MAPA DA LIBERDADE</title>

  <!-- PWA — iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mapa">
  <link rel="apple-touch-icon" href="icons/icon.svg">

  <!-- PWA — Geral -->
  <meta name="theme-color" content="#3a2412">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <nav id="main-nav" class="nav-rpg"></nav>
  <div id="app" class="page-container"></div>
  <div id="toast-container" class="toast-container"></div>
  <div id="modal-container"></div>

  <footer class="app-footer">
    <button class="footer-btn footer-btn-sync" onclick="openSyncModal()">
      <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M2 10a8 8 0 0 1 13.5-5.8"/>
        <path d="M18 10a8 8 0 0 1-13.5 5.8"/>
        <polyline points="14,4 17.5,4.2 17.3,7.7"/>
        <polyline points="6,16 2.5,15.8 2.7,12.3"/>
      </svg>
      Sincronizar
    </button>
    <span class="footer-sep">·</span>
    <button class="footer-btn footer-btn-exit" onclick="doLogout()">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M13 10H3m0 0l3-3m-3 3l3 3"/>
        <path d="M8 5V3.5A1.5 1.5 0 0 1 9.5 2h7A1.5 1.5 0 0 1 18 3.5v13a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 8 16.5V15"/>
      </svg>
      Sair
    </button>
  </footer>

  <script src="js/data.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .catch(err => console.warn('SW não registrado:', err));
      });
    }
  </script>

</body>
</html>
