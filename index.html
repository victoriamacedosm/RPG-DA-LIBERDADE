<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="RPG DA LIBERDADE — Construindo uma vida com mais escolhas, autonomia e liberdade.">
  <title>RPG DA LIBERDADE</title>

  <!-- PWA — iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="RPG">
  <link rel="apple-touch-icon" href="icons/icon.svg">

  <!-- PWA — Geral -->
  <meta name="theme-color" content="#3a2412">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <nav id="main-nav" class="nav-rpg"></nav>
  <div id="app" class="page-container"></div>
  <div id="toast-container" class="toast-container"></div>
  <div id="modal-container"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .catch(err => console.warn('SW não registrado:', err));
      });
    }
  </script>

</body>
</html>
